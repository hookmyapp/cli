name: Nightly CLI Login (real WorkOS)

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  nightly-cli-login:
    if: >
      github.event_name == 'push' ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
       github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'
      - name: Install dependencies
        run: npm ci
      - name: Build CLI
        run: node build.mjs
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
      - name: Run nightly CLI login spec against staging
        env:
          HOOKMYAPP_API_URL: https://staging-api.hookmyapp.com
          E2E_API_BASE_URL: https://staging-api.hookmyapp.com
          E2E_PROVISION_SECRET: ${{ secrets.E2E_PROVISION_SECRET }}
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
          E2E_MEMBER_EMAIL: ${{ secrets.E2E_MEMBER_EMAIL }}
          E2E_MEMBER_PASSWORD: ${{ secrets.E2E_MEMBER_PASSWORD }}
        run: npm run test:integration:nightly
      - name: Upload login dumps on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-login-dumps
          path: |
            test-integration/.cache/login-*.png
            test-integration/.cache/login-*.html
          retention-days: 7
          if-no-files-found: ignore
