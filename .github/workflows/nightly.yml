name: Nightly CLI Login (real WorkOS)

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  nightly-cli-login:
    if: >
      github.event_name == 'push' ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
       github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    # Browsers + system deps are pre-baked in this image, pinned to the same
    # playwright version we depend on (1.59.1 → chromium v1217). This replaces
    # the flaky `npx playwright install` CDN download that hung for the full
    # 15m timeout every night since 2026-05-29.
    container: mcr.microsoft.com/playwright:v1.59.1-noble
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'
      - name: Install dependencies
        run: npm ci
      - name: Build CLI
        run: node build.mjs
      - name: Run nightly CLI login spec against staging
        env:
          HOOKMYAPP_API_URL: https://staging-api.hookmyapp.com
          E2E_API_BASE_URL: https://staging-api.hookmyapp.com
          E2E_PROVISION_SECRET: ${{ secrets.E2E_PROVISION_SECRET }}
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
          E2E_MEMBER_EMAIL: ${{ secrets.E2E_MEMBER_EMAIL }}
          E2E_MEMBER_PASSWORD: ${{ secrets.E2E_MEMBER_PASSWORD }}
        run: npm run test:integration:nightly
      - name: Upload login dumps on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-login-dumps
          path: |
            test-integration/.cache/login-*.png
            test-integration/.cache/login-*.html
          retention-days: 7
          if-no-files-found: ignore
