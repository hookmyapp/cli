name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - name: Install dependencies
        run: npm install --include=dev
        env:
          NODE_ENV: development
      - name: Build
        run: node build.mjs
        env:
          HOOKMYAPP_SENTRY_DSN: ${{ secrets.HOOKMYAPP_CLI_SENTRY_DSN }}
          HOOKMYAPP_CLI_RELEASE: ${{ github.ref_name }}
          HOOKMYAPP_POSTHOG_TOKEN: ${{ secrets.HOOKMYAPP_POSTHOG_TOKEN }}
          HOOKMYAPP_POSTHOG_HOST: ${{ secrets.HOOKMYAPP_POSTHOG_HOST }}
      - name: Verify build
        run: node bin/hookmyapp.js --version
      - name: Publish to npm (OIDC + provenance)
        # prepublishOnly reruns the build during `npm publish`; keep the same
        # env as the Build step so the rebuild bakes identical release values.
        run: npm publish --provenance --access public
        env:
          HOOKMYAPP_SENTRY_DSN: ${{ secrets.HOOKMYAPP_CLI_SENTRY_DSN }}
          HOOKMYAPP_CLI_RELEASE: ${{ github.ref_name }}
          HOOKMYAPP_POSTHOG_TOKEN: ${{ secrets.HOOKMYAPP_POSTHOG_TOKEN }}
          HOOKMYAPP_POSTHOG_HOST: ${{ secrets.HOOKMYAPP_POSTHOG_HOST }}

  notify-failure:
    needs: [publish]
    if: always() && (contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled'))
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Notify maintainers of workflow failure
        env:
          MAINTAINER_ALERT_URL_CRITICAL: ${{ secrets.MAINTAINER_ALERT_URL_CRITICAL }}
          MAINTAINER_ALERT_TOKEN: ${{ secrets.MAINTAINER_ALERT_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          [ -z "$MAINTAINER_ALERT_URL_CRITICAL" ] && { echo "no maintainer alert configured"; exit 0; }
          curl -fsS --connect-timeout 5 --max-time 15 -X POST "$MAINTAINER_ALERT_URL_CRITICAL" \
            -H "authorization: Bearer $MAINTAINER_ALERT_TOKEN" \
            -H 'content-type: application/json' \
            -d "$(jq -nc --arg u "$RUN_URL" '{title:"publish.yml failed",text:"a tagged release did not publish",url:$u}')"
