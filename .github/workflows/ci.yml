name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'
          cache: 'npm'
      - run: npm ci
      - run: npx tsc --noEmit
      # Build BEFORE npm test: cli-error-integration.test.ts spawns
      # bin/hookmyapp.js, which imports ../dist/cli.js. Testing before the
      # build made those 4 tests fail on every CI run since 0.12.6 (empty
      # stderr instead of the JSON envelope) while passing locally, where a
      # dev build of dist/ always exists.
      - run: node build.mjs
      - run: npm test
      - run: node bin/hookmyapp.js --version

  notify-failure:
    needs: [test]
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main' && (contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled'))
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Notify maintainers of workflow failure
        env:
          MAINTAINER_ALERT_URL: ${{ secrets.MAINTAINER_ALERT_URL }}
          MAINTAINER_ALERT_TOKEN: ${{ secrets.MAINTAINER_ALERT_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          [ -z "$MAINTAINER_ALERT_URL" ] && { echo "no maintainer alert configured"; exit 0; }
          curl -fsS --connect-timeout 5 --max-time 15 -X POST "$MAINTAINER_ALERT_URL" \
            -H "authorization: Bearer $MAINTAINER_ALERT_TOKEN" \
            -H 'content-type: application/json' \
            -d "$(jq -nc --arg u "$RUN_URL" '{title:"ci.yml failed on main",text:"main-branch build/tests are red",url:$u}')"
